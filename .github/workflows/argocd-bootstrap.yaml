name: ArgoCD Bootstrap

on:
  push:
    branches:
      - main
    paths:
      - "bootstrap/argocd/**"
      - ".github/workflows/argocd-bootstrap.yaml"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: argocd-bootstrap-${{ github.ref }}
  cancel-in-progress: true

jobs:
  argocd-bootstrap:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: bootstrap/argocd

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: eu-west-2

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region eu-west-2 \
            --name codeserver-cluster

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform init
        run: terraform init 

      - name: Terraform fmt check
        run: terraform fmt -check -recursive

      - name: Terraform validate
        run: terraform validate

      - name: Terraform apply
        run: terraform apply -auto-approve

      - name: Install cert-manager CRDs
        run: |
          kubectl apply -f https://github.com/cert-manager/cert-manager/releases/download/v1.14.4/cert-manager.crds.yaml

      - name: Create code-server secret
        run: |
          kubectl create namespace code-server --dry-run=client -o yaml | kubectl apply -f -
          kubectl create secret generic code-server-secret \
            --namespace code-server \
            --from-literal=PASSWORD=${{ secrets.CODE_SERVER_PASSWORD }} \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Apply root app
        run: |
          kubectl apply -f ../../kubernetes/apps/root-app.yaml

      - name: Wait for ArgoCD to sync
        run: |
          sleep 60

      - name: Apply cluster issuer
        run: |
          kubectl apply -f ../../kubernetes/deployments/cert-manager/