name: Terraform Destroy

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: terraform-destroy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  terraform-destroy:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: infra

    env:
      AWS_REGION: eu-west-2

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: eu-west-2

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region eu-west-2 \
            --name codeserver-cluster

      - name: Delete ArgoCD applications
        run: |
          kubectl delete applications --all -n argocd --ignore-not-found=true
          sleep 30

      - name: Delete ingress-nginx service
        run: |
          kubectl delete svc --all-namespaces -l app.kubernetes.io/name=ingress-nginx --ignore-not-found=true
          sleep 30

      - name: Delete project AWS load balancers
        run: |
          LB_ARNS=$(aws elbv2 describe-load-balancers \
            --region eu-west-2 \
            --query 'LoadBalancers[*].LoadBalancerArn' \
            --output text)
          for ARN in $LB_ARNS; do
            CLUSTER_TAG=$(aws elbv2 describe-tags \
              --resource-arns "$ARN" \
              --region eu-west-2 \
              --query "TagDescriptions[0].Tags[?Key=='kubernetes.io/cluster/codeserver-cluster'].Value" \
              --output text)
            if [ "$CLUSTER_TAG" = "owned" ] || [ "$CLUSTER_TAG" = "shared" ]; then
              echo "Deleting load balancer owned by codeserver-cluster: $ARN"
              aws elbv2 delete-load-balancer \
                --load-balancer-arn "$ARN" \
                --region eu-west-2
            else
              echo "Skipping unrelated load balancer: $ARN"
            fi
          done
          sleep 60

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform init
        run: terraform init -input=false

      - name: Terraform destroy
        run: terraform destroy -input=false -auto-approve