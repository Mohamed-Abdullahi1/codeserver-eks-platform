name: Docker Build & Push

on:
  push:
    branches:
      - main
    paths:
      - "Dockerfile"
      - "code-server/**"
      - ".github/workflows/docker-build-push.yaml"
  workflow_dispatch:

permissions:
  id-token: write
  contents: write

concurrency:
  group: docker-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    env:
      AWS_REGION: eu-west-2
      ECR_REPOSITORY: code-server
      ECR_REGISTRY: 454374565233.dkr.ecr.eu-west-2.amazonaws.com

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }} .

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
          format: table
          exit-code: 0
          vuln-type: os,library
          severity: CRITICAL,HIGH

      - name: Push image to ECR
        run: |
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }}

      - name: Update Kubernetes manifest
        run: |
          sed -i "s|image: .*code-server:.*|image: $ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }}|" kubernetes/deployments/code-server/deployment.yaml

      - name: Commit and push updated manifest
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add kubernetes/deployments/code-server/deployment.yaml
          git commit -m "chore: bump image tag to ${{ github.sha }}" || echo "No changes to commit"
          git push