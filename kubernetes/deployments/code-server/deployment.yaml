apiVersion: apps/v1
kind: Deployment 
metadata:
  name: code-server 
spec:
  replicas: 1
  selector:
    matchLabels:
      app: code-server
  template:
    metadata:
      labels: 
        app: code-server
    spec:
      securityContext:
        fsGroup: 1000
      containers:
      - name: code-server
        image: 454374565233.dkr.ecr.eu-west-2.amazonaws.com/code-server:fa81bae97fc94b6ee3da7cd49d048edbd11812d2
        ports:
        - containerPort: 8080
        env: 
          - name: PASSWORD
            valueFrom: 
              secretKeyRef:
                name: code-server-secret
                key: PASSWORD
        volumeMounts:
        - name: data 
          mountPath: /home/coder 
      volumes: 
      - name: data
        persistentVolumeClaim:
          claimName: code-server-pvc
