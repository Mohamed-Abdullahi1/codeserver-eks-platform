apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-dns
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://kubernetes-sigs.github.io/external-dns
    chart: external-dns
    targetRevision: 1.14.4
    helm:
      values: |
        provider: aws
        aws:
          region: eu-west-2
        domainFilters:
          - codeserver.moabdullahi.uk
        policy: sync
        serviceAccount:
          annotations:
            eks.amazonaws.com/role-arn: arn:aws:iam::454374565233:role/external-dns-role
  destination:
    server: https://kubernetes.default.svc
    namespace: external-dns
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true