apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: 58.2.0
    helm:
      values: |
        prometheus:
          ingress:
            enabled: true
            ingressClassName: alb
            annotations:
              cert-manager.io/cluster-issuer: letsencrypt-prod
              alb.ingress.kubernetes.io/scheme: internet-facing
              alb.ingress.kubernetes.io/target-type: ip
              alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80},{"HTTPS":443}]'
              external-dns.alpha.kubernetes.io/hostname: prometheus.codeserver.moabdullahi.uk
            hosts:
              - prometheus.codeserver.moabdullahi.uk
            paths:
              - /
            tls:
              - secretName: prometheus-tls
                hosts:
                  - prometheus.codeserver.moabdullahi.uk

        grafana:
          enabled: true
          admin:
            existingSecret: grafana-admin-secret
            userKey: admin-user
            passwordKey: admin-password
          ingress:
            enabled: true
            ingressClassName: alb
            annotations:
              cert-manager.io/cluster-issuer: letsencrypt-prod
              alb.ingress.kubernetes.io/scheme: internet-facing
              alb.ingress.kubernetes.io/target-type: ip
              alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80},{"HTTPS":443}]'
              external-dns.alpha.kubernetes.io/hostname: grafana.codeserver.moabdullahi.uk
            hosts:
              - grafana.codeserver.moabdullahi.uk
            tls:
              - secretName: grafana-tls
                hosts:
                  - grafana.codeserver.moabdullahi.uk

        alertmanager:
          enabled: false

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true